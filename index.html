<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVO Clothing</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #d4af37;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .hero {
      background: url('Drake.png') center/cover no-repeat;
      height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d4af37;
      font-size: 3rem;
      font-weight: bold;
    }

    .section {
      padding: 40px 20px;
    }

    .section h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #111;
      padding: 10px;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      padding: 20px;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  OVO CLOTHING
</header>

<div class="hero">
  GOAT CLOTHING
</div>

<div class="section">
  <h2>About OVO</h2>
  <p>
    OVO (October’s Very Own) is a premium streetwear brand founded by Drake. 
    Known for its iconic owl logo, the brand blends luxury fashion with street culture.
  </p>
</div>

<div class="section">
  <h2>Collection</h2>
  <div class="grid">
    <div class="card"><img src="https://via.placeholder.com/300" alt="Outfit 1"></div>
    <div class="card"><img src="https://via.placeholder.com/300" alt="Outfit 2"></div>
    <div class="card"><img src="https://via.placeholder.com/300" alt="Outfit 3"></div>
    <div class="card"><img src="https://via.placeholder.com/300" alt="Outfit 4"></div>
  </div>
</div>

<footer>
  © 2026 OVO Clothing | Inspired by Drake
</footer>

</body>
</html>
